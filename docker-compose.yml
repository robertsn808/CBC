version: "3.8"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: capture
      POSTGRES_USER: cbc_user
      POSTGRES_PASSWORD: yourpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://cbc_user:yourpassword@db:5432/capture
    depends_on:
      - db

volumes:
  postgres_data:
